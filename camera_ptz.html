<head>

<script type="text/javascript">

function ptzcmd(cmd)
{
	var ptz_cmd=0;
	switch(cmd)
	{
		case "zoomin":ptz_cmd=11;	break;
		case "zoomout":ptz_cmd=10;	break;
		case "focusfar":ptz_cmd=9;	break;
		case "focusnear":ptz_cmd=8;	break;
		case "irislarge":ptz_cmd=6;	break;
		case "irissmall":ptz_cmd=7;	break;
		case "left":ptz_cmd=3;	break;
		case "right":ptz_cmd=4;	break;
		case "top":ptz_cmd=1;	break;
		case "down":ptz_cmd=2;	break;
		case "stop":ptz_cmd=5; break;
		case "lefttop": ptz_cmd=19;break;
		case "righttop": ptz_cmd=21;break;
		case "leftdown": ptz_cmd=20;break;
		case "rightdown": ptz_cmd=22;break;
		case "vscan":ptz_cmd=36; break;
		case "hscan":ptz_cmd=37; break;
		default: return;
	}
	
	var params = {opType:"set",cmd:"ptz",ptz_cmd:ptz_cmd};
	call_cgi("cmd.cgi", params);
}

$(function(){

	document.getElementById("zoomin").alt=a[415];
	document.getElementById("zoomout").alt=a[416];
	document.getElementById("vertical").alt=a[417];
	document.getElementById("horizontal").alt=a[418];

	document.getElementById("zoomin").title=a[415];
	document.getElementById("zoomout").title=a[416];
	document.getElementById("vertical").title=a[417];
	document.getElementById("horizontal").title=a[418];
	
});

</script><!-- End Preload Script -->
