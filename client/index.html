<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1" />

    <title>Meowstik - Your Purrfect AI Assistant</title>
    <meta property="og:title" content="Meowstik" />
    <meta property="og:description" content="A purrfect AI chat assistant. Always curious, always helpful!" />
    <meta property="og:type" content="website" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Meowstik" />
    <meta name="twitter:description" content="A purrfect AI chat assistant. Always curious, always helpful!" />
    <meta property="og:image" content="/og-image.png" />
    <meta name="twitter:image" content="/og-image.png" />

    <link rel="icon" type="image/png" href="/favicon.png" />
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#2563eb" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Meowstik" />
    <link rel="apple-touch-icon" href="/favicon.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet">
  </head>
  <body>
    <div id="root"></div>
    <script>
      window.onerror = function (msg, url, lineNo, columnNo, error) {
        const errorData = {
          msg: msg,
          url: url,
          lineNo: lineNo,
          columnNo: columnNo,
          error: error ? error.stack : null,
          type: "client-error"
        };
        console.error("Global Error Caught:", errorData);
        fetch('/api/client-log', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(errorData)
        }).catch(e => console.error("Failed to report error:", e));
        return false;
      };
      
      window.addEventListener('unhandledrejection', function(event) {
        const errorData = {
          msg: event.reason ? (event.reason.message || String(event.reason)) : "Unhandled Rejection",
          error: event.reason ? event.reason.stack : null,
          type: "unhandled-rejection"
        };
        console.error("Unhandled Rejection Caught:", errorData);
        fetch('/api/client-log', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(errorData)
        }).catch(e => console.error("Failed to report rejection:", e));
      });

      // Patch console.error to capture logged errors
      const originalConsoleError = console.error;
      console.error = function(...args) {
        originalConsoleError.apply(console, args);
        // Avoid infinite loop if fetch fails and logs error
        try {
            const msg = args.map(a => (typeof a === 'object' ? JSON.stringify(a) : String(a))).join(' ');
            if (msg.includes("Failed to report")) return;
            
            fetch('/api/client-log', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    msg: msg,
                    type: "console-error"
                })
            }).catch(() => {});
        } catch (e) {}
      };
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
